version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yci_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d/migrations

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/yci_db
      SECRET_KEY: production_secret_key_change_this
    depends_on:
      - db
    networks:
      - yci-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend-customer/dist:/usr/share/nginx/html/customer:ro
      - ../frontend-admin/dist:/usr/share/nginx/html/admin:ro
      - ../frontend-staff/dist:/usr/share/nginx/html/staff:ro
    depends_on:
      - backend
    networks:
      - yci-net

volumes:
  postgres_data:

networks:
  yci-net:
    driver: bridge
