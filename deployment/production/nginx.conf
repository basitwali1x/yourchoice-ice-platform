worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Fly.io logs to stdout
    access_log /dev/stdout;
    error_log /dev/stderr;

    # 1. API Service
    server {
        listen 8080;
        server_name api.yourchoiceice.com;

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. Admin Portal
    server {
        listen 8080;
        server_name admin.yourchoiceice.com;

        root /var/www/html/admin;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # 3. Staff Portal
    server {
        listen 8080;
        server_name staff.yourchoiceice.com;

        root /var/www/html/staff;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # 4. Customer Portal (Default / Catch-all)
    server {
        listen 8080 default_server;
        server_name yourchoiceice.com www.yourchoiceice.com _;

        root /var/www/html/customer;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
