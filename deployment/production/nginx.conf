# user root;
worker_processes 1;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Fly.io logs to stdout
    access_log /dev/stdout;
    error_log /dev/stderr info;

    # 1. API Service
    server {
        listen 8081;
        server_name api.yourchoiceice.com;

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Debug-Source "Nginx-API";
        }
    }

    # 2. Admin Portal
    server {
        listen 8081;
        server_name admin.yourchoiceice.com;

        root /var/www/html/admin;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            add_header X-Debug-Source "Nginx-Admin";
        }

        # API Proxies for Admin
        location /auth/ { proxy_pass http://127.0.0.1:8000; }
        location /products/ { proxy_pass http://127.0.0.1:8000; }
        location /customers/ { proxy_pass http://127.0.0.1:8000; }
        location /orders/ { proxy_pass http://127.0.0.1:8000; }
        location /reports/ { proxy_pass http://127.0.0.1:8000; }
        location /logistics/ { proxy_pass http://127.0.0.1:8000; }
        location /work-orders/ { proxy_pass http://127.0.0.1:8000; }
        location /optimization/ { proxy_pass http://127.0.0.1:8000; }
        location /drivers/ { proxy_pass http://127.0.0.1:8000; }
        location /distribution-centers/ { proxy_pass http://127.0.0.1:8000; }
        location /routes/ { proxy_pass http://127.0.0.1:8000; }
    }

    server {
        listen 8081;
        server_name staff.yourchoiceice.com;

        root /var/www/html/staff;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            add_header X-Debug-Source "Nginx-Staff";
        }

        # API Proxies
        location /auth/ { proxy_pass http://127.0.0.1:8000; }
        location /driver/ { proxy_pass http://127.0.0.1:8000; }
        location /routes/ { proxy_pass http://127.0.0.1:8000; }
        location /customers/ { proxy_pass http://127.0.0.1:8000; }
        location /distribution-centers/ { proxy_pass http://127.0.0.1:8000; }
    }

    # 4. Customer Portal (Default / Catch-all)
    server {
        listen 8081 default_server;
        server_name yourchoiceice.com www.yourchoiceice.com _;

        root /var/www/html;
        index index.html;

        # Main Customer App
        location / {
            root /var/www/html/customer;
            try_files $uri $uri/ /index.html;
            add_header X-Debug-Source "Nginx-Customer";
        }

        # Admin Portal alias
        location /admin {
            alias /var/www/html/admin;
            try_files $uri $uri/ /admin/index.html;
        }

        # Staff Portal alias
        location /staff {
            alias /var/www/html/staff;
            try_files $uri $uri/ /staff/index.html;
        }

        # API Proxy Pass (Catch-all for backend routes)
        # Add common backend prefixes to avoid conflicts with static files if necessary,
        # but since try_files handles statics above, we can catch the rest.
        location /auth/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /products/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /customers/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /logistics/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /orders/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /reports/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /integrations/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /work-orders/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /optimization/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /drivers/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /distribution-centers/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /routes/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    }
}
