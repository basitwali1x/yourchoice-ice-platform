worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Fly.io logs to stdout
    access_log /dev/stdout;
    error_log /dev/stderr;

    server {
        # Fly.io terminates SSL, so we listen on standard port (mapped to env PORT usually)
        listen 8080;
        server_name _;

        root /var/www/html;
        index index.html;

        # 1. API Proxy
        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. Staff App (Subdomain)
        # Note: On Fly/Cloud, routing usually handled by domain mapping or path. 
        # For simplicity in this monorepo + single container, we use path routing 
        # OR we rely on the implementation plan's assumption of separate domains pointing to same IP.
        # Here we will try to infer based on Host header OR fallback to paths. 
        
        # Admin Portal
        location /admin {
            alias /var/www/html/admin;
            try_files $uri $uri/ /admin/index.html;
        }

        # Staff Portal
        location /staff {
            alias /var/www/html/staff;
            try_files $uri $uri/ /staff/index.html;
        }

        # Customer Portal (Root)
        location / {
            root /var/www/html/customer;
            try_files $uri $uri/ /index.html;
        }
    }
}
