events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Backend API
    upstream backend_api {
        server backend:8000;
    }

    # FRONTEND: Customer App (Main Domain)
    server {
        listen 80;
        server_name yourchoiceice.com www.yourchoiceice.com;

        location / {
            root   /usr/share/nginx/html/customer;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }

    # FRONTEND: Admin App (Subdomain)
    server {
        listen 80;
        server_name admin.yourchoiceice.com;

        location / {
            root   /usr/share/nginx/html/admin;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }

    # FRONTEND: Staff App (Subdomain)
    server {
        listen 80;
        server_name staff.yourchoiceice.com;

        location / {
            root   /usr/share/nginx/html/staff;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }

    # BACKEND: API (Subdomain)
    server {
        listen 80;
        server_name api.yourchoiceice.com;

        location / {
            proxy_pass         http://backend_api;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }
    }
}
