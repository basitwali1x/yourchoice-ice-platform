app = "yci-platform-2026"
primary_region = "dfw"

[build]
  dockerfile = "deployment/production/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "yci_data"
  destination = "/app/backend/data"
